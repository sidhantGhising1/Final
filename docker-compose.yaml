version: "4.9"
services:
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    networks: [app-network]
  backend:
    build: ./backend
    ports: ["5000:5000"]
    environment:
      - MONGO_URL=mongodb://db:27017/siddb
    depends_on: [db]
    networks: [app-network]
  db:
    image: mongo:7
    volumes: [mongo-data:/data/db]
    networks: [app-network]
